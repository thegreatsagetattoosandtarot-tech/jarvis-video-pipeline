name: Deploy JARVIS Mission Control to Hostinger

on:
  push:
    branches: [main, master]
    paths:
      - 'services/mission_control/**'
      - 'deploy/**'
      - 'config/**'
      - 'scripts/deployment/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      force_rebuild:
        description: 'Force rebuild without cache'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mission-control
  DEPLOY_PATH: /opt/jarvis

jobs:
  # ─────────────────────────────────────────────────────────────
  # TEST & LINT
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r deploy/requirements.mission-control.txt
          pip install pytest pytest-asyncio pytest-cov ruff black isort

      - name: Run linting
        run: |
          ruff check services/mission_control/
          black --check services/mission_control/
          isort --check-only services/mission_control/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=services/mission_control --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  # ─────────────────────────────────────────────────────────────
  # BUILD DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.mission-control
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # DEPLOY TO HOSTINGER VPS
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script_stop: true
          envs: GITHUB_SHA,REGISTRY,IMAGE_NAME
          script: |
            set -euo pipefail
            
            echo "🚀 Starting JARVIS Mission Control deployment..."
            echo "Commit: ${GITHUB_SHA}"
            echo "Image: ${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            
            # Navigate to deploy directory
            cd ${DEPLOY_PATH}/deploy
            
            # Pull latest images
            echo "📦 Pulling latest Docker images..."
            docker-compose pull
            
            # Update image tag in docker-compose
            sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}|g" docker-compose.yml
            
            # Deploy with docker-compose
            echo "🚀 Deploying services..."
            docker-compose up -d --remove-orphans
            
            # Wait for health checks
            echo "⏳ Waiting for services to be healthy..."
            sleep 30
            
            # Verify deployment
            echo "🔍 Verifying deployment..."
            HEALTH_URL="https://jarvis.yourdomain.com/health"
            N8N_HEALTH_URL="https://n8n.yourdomain.com/healthz"
            
            for i in {1..10}; do
              if curl -f -s "$HEALTH_URL" > /dev/null; then
                echo "✅ Mission Control is healthy"
                break
              fi
              echo "  Attempt $i/10: waiting for Mission Control..."
              sleep 10
            done
            
            for i in {1..10}; do
              if curl -f -s "$N8N_HEALTH_URL" > /dev/null; then
                echo "✅ n8n is healthy"
                break
              fi
              echo "  Attempt $i/10: waiting for n8n..."
              sleep 10
            done
            
            # Show running containers
            echo "📊 Running containers:"
            docker-compose ps
            
            echo "✅ Deployment complete!"

  # ─────────────────────────────────────────────────────────────
  # NOTIFY
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    steps:
      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "JARVIS Mission Control Deployment"
          description: "Deployment ${{ job.status }} for commit ${{ github.sha }}"
          color: ${{ job.status == 'success' && '3066993' || '15158332' }}

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "JARVIS Mission Control Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment ${{ job.status }}* for commit `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}