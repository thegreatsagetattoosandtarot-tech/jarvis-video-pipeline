# GitHub Actions CI/CD Pipeline for JARVIS OS
# Deploys Mission Control + n8n to Hostinger VPS

name: Deploy JARVIS Mission Control

on:
  push:
    branches: [main, master]
    paths:
      - 'services/mission_control/**'
      - 'deploy/**'
      - 'config/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mission-control

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('deploy/requirements.mission-control.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r deploy/requirements.mission-control.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --cov=services/mission_control --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.mission-control
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script_stop: true
          envs: GITHUB_SHA,IMAGE_NAME
          script: |
            set -e
            echo "🚀 Starting JARVIS Mission Control deployment..."
            
            # Pull latest image
            echo "📦 Pulling Docker image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}
            
            # Tag as latest
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA} \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Deploy with docker-compose
            cd /opt/jarvis/deploy
            
            # Update docker-compose with new image
            sed -i "s|image: .*mission-control.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest|g" docker-compose.yml
            
            # Pull all images
            docker-compose pull
            
            # Start services
            docker-compose up -d --remove-orphans
            
            # Wait for health checks
            echo "⏳ Waiting for services to be healthy..."
            sleep 30
            
            # Verify deployment
            if curl - name="mission-control"
            health_url="https://jarvis.yourdomain.com/health"
            
            for i in {1..10}; do
              if curl -sf "$health_url" > /dev/null; then
                echo "✅ $name is healthy!"
                break
              fi
              echo "⏳ Waiting for $name... ($i/10)"
              sleep 10
            done
            
            # Cleanup old images
            docker image prune -f
            
            echo "✅ Deployment complete!"
            
            # Send notification
            curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="✅ JARVIS Mission Control deployed successfully! (${GITHUB_SHA::8})"

  notify_failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ JARVIS deployment failed! Check GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"