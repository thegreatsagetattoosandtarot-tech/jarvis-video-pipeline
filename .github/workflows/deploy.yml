name: Deploy to Fly.io

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_APP_NAME: jarvis-os

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || true

      - name: Lint with Ruff
        run: |
          ruff check . || true

      - name: Type check with MyPy
        run: |
          mypy . --ignore-missing-imports || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io Registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.fly.io/${{ env.FLY_APP_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=registry.fly.io/${{ env.FLY_APP_NAME }}:buildcache
          cache-to: type=registry,ref=registry.fly.io/${{ env.FLY_APP_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --app ${{ env.FLY_APP_NAME }} --image registry.fly.io/${{ env.FLY_APP_NAME }}:${{ github.sha }} --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f https://${{ env.FLY_APP_NAME }}.fly.dev/health || exit 1

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "Deployment failed! Check GitHub Actions for details."
          # Add Slack/Discord/Email notification here